# ── Sidebar & page header ────────────────────────────────────────────────────
[profile]
name        = "Tobias Heß"
initials    = "TH"
title       = "Academic Staff"
affiliation = "DHBW Heidenheim"

bio = """
After graduating with a master's degree in Mathematics from the University of Ulm, Germany, I am currently pursuing a PhD in computer science, also at the University of Ulm. 
My reasearch focus is the analysis of configurable (software) systems, typically by means of knowledge compilation, especially binary decision diagrams.

I currently work as a lecturer and system administrator at the [Baden-Wuerttemberg Cooperative State University (DHBW) Heidenheim](https://www.heidenheim.dhbw.de/en/home). 
Therein, my core responsibility, besides teaching, is the creation of interdisciplinary concepts and systems across multiple study programs.
"""

